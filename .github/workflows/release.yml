name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish nsm-nitro-enclave-utils-keygen
        run: cargo publish -p nsm-nitro-enclave-utils-keygen
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io to index nsm-nitro-enclave-utils-keygen
        run: sleep 30
      - name: Publish nsm-nitro-enclave-utils
        run: cargo publish -p nsm-nitro-enclave-utils
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
